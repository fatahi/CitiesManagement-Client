<div class="container">
    <div class="col-md-6">
    <form [formGroup]="form" (ngSubmit)="submitForm()">
        <div class="form-group">
            <label for="country">Country</label>
            <select class="custom-select" (change)="selectCountryChangeHandler($event)" required>
              <option value="" class="text-primary font-weight-bolder">
                --- Select Country ---
              </option>
              <option *ngFor="let item of Countries" [value]="item.id">
                {{item.countryName}}
              </option>
            </select>
            <div class="alert alert-danger" *ngIf="f.cityName.touched && f.cityName.invalid">
              <div *ngIf="f.cityName.errors?.required">City Name is required.</div>
          </div>
        </div>

       <div class="form-group">
        <label for="picture">picture</label>
          <input type="file" (change)="uploadFile($event)">
       </div>
 
       <div class="form-group input-group-lg">
        <label for="cityName">City Name</label>
          <input class="form-control" placeholder="City Name" formControlName="cityName" >
          <div class="alert alert-danger" *ngIf="f.cityName.touched && f.cityName.invalid">
            <div *ngIf="f.cityName.errors?.required">City Name is required.</div>
        </div>
       </div>

       <div class="form-group input-group-lg">
        <label for="comment">Comment</label>
        <textarea class="form-control" placeholder="Comment" rows="4" formControlName="comment"></textarea>
     </div>

     <div class="form-group input-group-lg">
        <label for="attrctionFactor">Attraction Factor</label>
        <select class="custom-select" name="attrctionFactor" (change)="selectChangeHandler($event)">
            <option value="0" class="text-primary font-weight-bolder">
              --- Select Value ---
            </option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
     </div>

       <div class="form-group">
        <button class="btn btn-success btn-sm" type="submit" [class.disabled]="!form.valid">Submit</button>
        <a class="btn btn-primary btn-sm m-l-20"  routerLink="/cities" >Back To List</a>
       </div>
    </form>
</div>
 </div>
